sdk_names:
  model_name: opensearch
  package_name: opensearch
ignore:
  resource_names:
    - Package
    # - Domain
    - OutboundConnection
    - VpcEndpoint
    - Application
  field_paths:
    # SnapshotOptions is irrelevant for OpenSearch 5.3+
    - CreateDomainInput.SnapshotOptions
    - CreateDomainInput.IdentityCenterOptions
    - ClusterConfig.NodeOptions
    - CreateDomainOutput.DomainStatus.IdentityCenterOptions
resources:
  Domain:
    renames:
      operations:
        CreateDomain:
          input_fields:
            DomainName: Name
            TagList: Tags
        DeleteDomain:
          input_fields:
            DomainName: Name
        DescribeDomain:
          input_fields:
            DomainName: Name
    synced:
      when:
      - path: Status.DomainProcessingStatus
        in: [ "Active", "Isolated" ]
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    hooks:
      sdk_create_post_set_output:
        template_path: hooks/domain/sdk_create_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/domain/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/domain/sdk_update_pre_build_request.go.tpl
      sdk_delete_pre_build_request:
        template_path: hooks/domain/sdk_delete_pre_build_request.go.tpl
      delta_pre_compare:
        code: customPreCompare(delta, a, b)
    fields:
      # DescribeDomain does not return masterUserOptions in the response
      # To prevent a perpetual diff, ignore the fields from comparison
      AdvancedSecurityOptions.MasterUserOptions:
        compare:
          is_ignored: true
      AdvancedSecurityOptions.MasterUserOptions.MasterUserPassword:
        is_secret: true
      AutoTuneOptions.MaintenanceSchedules:
        compare:
          is_ignored: true
      AccessPolicies:
        is_iam_policy: true
      VPCOptions.SubnetIDs:
        references:
          service_name: ec2
          resource: Subnet
          path: Status.SubnetID
      VPCOptions.SecurityGroupIDs:
        references:
          resource: SecurityGroup
          path: Status.ID
          service_name: ec2
    update_operation:
      custom_method_name: customUpdateDomain
